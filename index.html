<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultados de Ciclismo</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="landing-body">

    <!-- Landing Header -->
    <header class="landing-header">
        <div class="container">
            <h1 class="landing-title">Resultados en Vivo</h1>
            <p class="landing-subtitle">V Fecha - Turrialba</p>
        </div>
    </header>

    <!-- Event Selection -->
    <main class="landing-main">
        <div class="container">
            <h2 class="landing-choose">Selecciona tu evento</h2>
            <div class="events-grid" id="events-grid">
                <!-- Events will be loaded here by JS -->
            </div>

            <!-- Loading -->
            <div id="landing-loading" class="loading-state">
                <div class="spinner"></div>
                <p>Cargando eventos...</p>
            </div>

            <!-- Error/Empty -->
            <div id="landing-empty" class="empty-state" style="display:none;">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <circle cx="12" cy="12" r="10"/>
                    <path d="M12 8v4M12 16h.01"/>
                </svg>
                <h4>No hay eventos configurados</h4>
                <p>Sube el archivo eventos.csv a la carpeta data/</p>
            </div>
        </div>
    </main>

    <!-- QR Section -->
    <section class="qr-section">
        <div class="container">
            <div class="qr-card">
                <div id="qr-code" class="qr-code"></div>
                <p class="qr-text">Escanea para ver los resultados</p>
            </div>
        </div>
    </section>

    <!-- Visitor Counter -->
    <div class="visitor-counter">
        <img src="https://visitor-badge.laobi.icu/badge?page_id=raceclubhub.com-v5" alt="visitas">
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>Resultados de Ciclismo</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <script src="js/landing.js?v=2"></script></script>
</body>
</html>
